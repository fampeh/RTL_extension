<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 12px;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #1f2937;
    }

    .mode-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mode-option {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .mode-option:hover {
      border-color: #60a5fa;
      background: #f8fbff;
    }

    .mode-option input[type="radio"] {
      accent-color: #2563eb;
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .mode-option.active {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 1px #bfdbfe inset;
    }

    .auto-row {
      margin-top: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    .auto-row input[type="checkbox"] {
      accent-color: #2563eb;
    }

    .version {
      margin-top: 10px;
      text-align: left;
      font-size: 11px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="mode-group" id="modeGroup">
    <label class="mode-option" data-mode="rtl">
      <input type="radio" name="mode" value="rtl" />
      <span>راست به چپ (RTL)</span>
    </label>
    <label class="mode-option" data-mode="ltr">
      <input type="radio" name="mode" value="ltr" />
      <span>چپ به راست (LTR)</span>
    </label>
    <label class="mode-option" data-mode="default">
      <input type="radio" name="mode" value="default" />
      <span>دیفالت (Default)</span>
    </label>
  </div>

  <label class="auto-row" for="autoCheck">
    <input type="checkbox" id="autoCheck" />
    <span>Auto Fix</span>
  </label>

  <div class="version" id="versionText"></div>

  <script src="popup.js"></script>
</body>
</html>
