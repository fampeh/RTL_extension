<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
      background-color: #f9fafb;
      color: #111827;
    }
    h2 {
      font-size: 16px;
      margin: 0 0 16px 0;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }
    .control-group {
      margin-bottom: 16px;
    }
    .control-label {
      font-size: 14px;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #d1d5db;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #3b82f6;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .radio-group label {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .radio-group input {
      margin-right: 8px;
    }
    .btn {
      width: 100%;
      padding: 8px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <h2>Persian Text Fixer</h2>
  
  <div class="control-group toggle-container">
    <span class="control-label" style="margin: 0;">Auto Fix Dynamic Content</span>
    <label class="switch">
      <input type="checkbox" id="autoFixToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="control-group radio-group">
    <span class="control-label">Fix Mode</span>
    <label>
      <input type="radio" name="mode" value="default"> Default (Smart Auto-RTL)
    </label>
    <label>
      <input type="radio" name="mode" value="rtl"> Force RTL (Dominant Blocks)
    </label>
    <label>
      <input type="radio" name="mode" value="ltr"> Disable Fixes (LTR)
    </label>
  </div>

  <button id="applyBtn" class="btn">Apply to Current Tab</button>

  <script src="popup.js"></script>
</body>
</html>
