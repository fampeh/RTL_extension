<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 12px;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #1f2937;
    }

    .mode-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .mode-option {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #fff;
    }

    .mode-option:hover {
      border-color: #60a5fa;
      background: #f8fbff;
    }

    .mode-option.active {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 1px #bfdbfe inset;
    }

    .mode-icon {
      width: 32px;
      height: 32px;
      display: block;
      pointer-events: none;
    }

    .auto-row {
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #cbd5e1;
      transition: .2s;
      border-radius: 999px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      top: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    .switch input:checked + .slider {
      background-color: #2563eb;
    }

    .switch input:checked + .slider:before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <div class="mode-group" id="modeGroup">
    <button class="mode-option" data-mode="ltr" aria-label="LTR mode" title="LTR mode" type="button">
      <img class="mode-icon" src="icons/ltr-32.png" alt="LTR" />
    </button>
    <button class="mode-option" data-mode="default" aria-label="Default mode" title="Default mode" type="button">
      <img class="mode-icon" src="icons/default-32.png" alt="Default" />
    </button>
    <button class="mode-option" data-mode="rtl" aria-label="RTL mode" title="RTL mode" type="button">
      <img class="mode-icon" src="icons/rtl-32.png" alt="RTL" />
    </button>
  </div>

  <label class="auto-row" for="autoCheck">
    <span>Auto Fix</span>
    <span class="switch">
      <input type="checkbox" id="autoCheck" />
      <span class="slider"></span>
    </span>
  </label>

  <script src="popup.js"></script>
</body>
</html>
