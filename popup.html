<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 120px;
      padding: 12px;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      background-color: #e0e0e0;
      color: #333;
      font-weight: bold;
      transition: 0.2s;
    }
    button.active {
      background-color: #4caf50;
      color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .status {
      font-size: 10px;
      margin-top: 8px;
      color: #555;
    }
  </style>
</head>
<body>
  <button id="fixBtn">RTL</button>
  <button id="resetBtn">LTR</button>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
