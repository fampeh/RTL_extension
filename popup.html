<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe3ef;
      --primary: #2563eb;
      --primary-soft: #e8f0ff;
      --hover: #f3f7ff;
      --shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      width: 272px;
      margin: 0;
      padding: 14px;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 65%);
      color: var(--text);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: 0.2px;
    }

    .mode-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .mode-option {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      cursor: pointer;
      transition: 0.18s ease;
      gap: 4px;
    }

    .mode-option:hover {
      border-color: #a6c1ff;
      background: var(--hover);
    }

    .mode-option.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      box-shadow: inset 0 0 0 1px #bdd2ff;
    }

    .mode-icon {
      width: 26px;
      height: 26px;
      pointer-events: none;
    }

    .mode-text {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      pointer-events: none;
    }

    .auto-row {
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .switch { position: relative; display: inline-block; width: 42px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #cbd5e1;
      transition: .2s;
      border-radius: 999px;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: white;
      transition: .2s;
    }
    .switch input:checked + .slider { background-color: var(--primary); }
    .switch input:checked + .slider::before { transform: translateX(20px); }
  </style>
</head>
<body>
  <section class="card">
    <h1 class="title">Persian Text Fixer</h1>

    <div class="mode-group" id="modeGroup" aria-label="Mode selection">
      <button class="mode-option" data-mode="ltr" aria-label="LTR mode" title="Disable fixes" type="button">
        <img class="mode-icon" src="icons/ltr-32.png" alt="LTR" />
        <span class="mode-text">LTR</span>
      </button>
      <button class="mode-option" data-mode="default" aria-label="Default mode" title="Smart auto-RTL" type="button">
        <img class="mode-icon" src="icons/default-32.png" alt="Default" />
        <span class="mode-text">Default</span>
      </button>
      <button class="mode-option" data-mode="rtl" aria-label="RTL mode" title="Force RTL" type="button">
        <img class="mode-icon" src="icons/rtl-32.png" alt="RTL" />
        <span class="mode-text">RTL</span>
      </button>
    </div>

    <label class="auto-row" for="autoCheck">
      <span>Auto fix dynamic content</span>
      <span class="switch">
        <input type="checkbox" id="autoCheck" />
        <span class="slider"></span>
      </span>
    </label>
  </section>

  <script src="popup.js"></script>
</body>
</html>
